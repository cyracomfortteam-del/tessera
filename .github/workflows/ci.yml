name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python ${{ matrix.python }} (CPU)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check tessera tests
      - name: Test (skip GPU-only kernels)
        run: pytest -q -m "not gpu" --cov=tessera

  rust:
    name: rust gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --manifest-path tessera-rs/Cargo.toml --check
      - name: clippy
        run: cargo clippy --manifest-path tessera-rs/Cargo.toml --all-targets -- -D warnings
      - name: test
        run: cargo test --manifest-path tessera-rs/Cargo.toml
