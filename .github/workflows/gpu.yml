# GPU kernel parity tests. Runs on a self-hosted CUDA runner (or manually) because the
# Triton/CUDA kernels can't execute on the free hosted runners. Every kernel is checked
# against its torch reference in tests/test_kernels_gpu.py.
name: gpu

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

jobs:
  triton-parity:
    runs-on: [self-hosted, gpu]
    if: ${{ github.repository_owner == 'zengxiao-he' }}
    steps:
      - uses: actions/checkout@v4
      - name: Environment
        run: nvidia-smi
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gpu]"
      - name: Kernel parity (Triton vs reference)
        run: pytest -q -m gpu -v
